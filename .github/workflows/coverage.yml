name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.10'

      - name: Cache packages
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: ${{ runner.os }}-julia-coverage-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-coverage-

      - name: Install dependencies and Coverage
        run: julia --project -e '
          using Pkg
          Pkg.instantiate()
          Pkg.add("Coverage")
        '

      - name: Run tests with coverage
        run: julia --project -e '
          using Pkg
          Pkg.test(coverage=true)
        '

      - name: Process and upload coverage
        run: julia --project -e '
          using Coverage
          cov = process_folder()
          LCOV.writefile("lcov.info", cov)
        '

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          fail_ci_if_error: false
